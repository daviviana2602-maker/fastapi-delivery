<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>

  <link rel="stylesheet" href="../css/style.css">

  <script>
    try {
      const user = JSON.parse(localStorage.getItem("user"));

      if (!user?.admin) {
        window.location.replace("/pages/dashboard.html");
      }
    } catch (e) {
      window.location.replace("/pages/login.html");
    }
  </script>

  <script src="../js/management.js" defer></script>
</head>

<body>

<div class="container">

  <div class="card">

    <h1>🛠 Admin Panel</h1>

    <div id="msg"></div>

    <input id="userId" type="number" placeholder="ID do usuário">

    <hr>

    <section>
      <h3>Admin</h3>
      <button onclick="promover()">Promover</button>
      <button onclick="rebaixar()">Rebaixar</button>
    </section>

    <hr>

    <section>
      <h3>Status usuário</h3>
      <button onclick="desativar()">Desativar</button>
      <button onclick="reativar()">Reativar</button>
    </section>

    <hr>

    <section>
      <h3>Listar pedidos</h3>
      <button onclick="listarPedidos('pendente')">Pendentes</button>
      <button onclick="listarPedidos('concluido')">Concluídos</button>
      <button onclick="listarPedidos('cancelado')">Cancelados</button>
    </section>

    <section>
      <h3>Pedidos</h3>
      <div id="ordersBox"></div>
    </section>

  </div>

</div>

</body>
</html>
