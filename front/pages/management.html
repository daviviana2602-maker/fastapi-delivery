<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>

  <link rel="stylesheet" href="../css/style.css">

  <script>

    const API_BASE =
      window.location.hostname === "localhost"
        ? "http://localhost:8000"
        : "https://fastapi-delivery.up.railway.app";

    const API = `${API_BASE}/auth`;

    const token = localStorage.getItem("access_token");

    if (!token) {
      window.location.replace("/pages/login.html");
    } else {

      fetch(`${API}/me`, {
        headers: {
          "Authorization": "Bearer " + token
        }
      })
      .then(r => r.json())
      .then(res => {

        const user = res.data || res;

        if (!user.admin) {
          window.location.replace("/pages/dashboard.html");
        }

      })
      .catch(() => {
        window.location.replace("/pages/login.html");
      });
    }

  </script>

  <script src="../js/management.js" defer></script>
</head>

<body>

<div class="container">

  <div class="card">

    <h1>🛠 Admin Panel</h1>

    <div id="msg"></div>

    <input id="userId" type="number" placeholder="ID do usuário">

    <hr>

    <section>
      <h3>Admin</h3>
      <button onclick="promover()">Promover</button>
      <button onclick="rebaixar()">Rebaixar</button>
    </section>

    <hr>

    <section>
      <h3>Status usuário</h3>
      <button onclick="desativar()">Desativar</button>
      <button onclick="reativar()">Reativar</button>
    </section>

    <hr>

    <section>
      <h3>Listar pedidos</h3>
      <button onclick="listarPedidos('pendente')">Pendentes</button>
      <button onclick="listarPedidos('concluido')">Concluídos</button>
      <button onclick="listarPedidos('cancelado')">Cancelados</button>
    </section>

    <section>
      <h3>Pedidos</h3>
      <div id="ordersBox"></div>
    </section>

  </div>

</div>

</body>
</html>
