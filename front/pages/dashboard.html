<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/auth-guard.js" defer></script>
</head>

<body>

<div style="display:flex; min-height:100vh; width:100%;">

  <!-- MENU LATERAL -->
  <div style="
    width: 240px;
    background:#161a22;
    border-right:1px solid #232838;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:10px;
  ">

    <h3>Menu</h3>

    <button onclick="window.location='./orders.html'">
      Pedidos
    </button>

    <button onclick="window.location='./profile.html'">
      Perfil
    </button>

    <button onclick="window.location='./management.html'" id="adminBtn">
      Admin
    </button>

    <hr>

    <button onclick="logout()">Sair</button>

  </div>

  <!-- CONTEÚDO -->
  <div style="flex:1; padding:20px;">

    <div class="card" style="max-width:100%;">

      <h1>Dashboard</h1>
      <p>Bem-vindo ao sistema</p>

      <hr>

      <div>
        <p>Selecione uma opção no menu lateral</p>
      </div>

    </div>

  </div>

</div>

<script>

function logout() {
  localStorage.removeItem("access_token");
  localStorage.removeItem("refresh_token");
  localStorage.removeItem("user");
  window.location.href = "/pages/login.html";
}

(function init() {
  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    window.location.href = "/pages/login.html";
    return;
  }

  if (!user.admin) {
    const adminBtn = document.getElementById("adminBtn");
    if (adminBtn) adminBtn.style.display = "none";
  }
})();

</script>

</body>
</html>
