<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .error-msg {
      background: #ef4444;
      color: white;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">

      <h1>Fazer login</h1>
      <p>Use sua conta</p>

      <div id="msg"></div>
      <div id="errorBox"></div>

      <input id="email" type="text" placeholder="Email" autocomplete="username">
      <input id="senha" type="password" placeholder="Senha" autocomplete="current-password">

      <button onclick="login()">Entrar</button>

      <p>Não tem conta? <a href="register.html">Criar conta</a></p>
      <p>Esqueceu sua senha? <a href="esqueci-senha.html">Recuperar</a></p>

    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>

</body>
</html>
