<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>Fazer login</h1>
      <p>Use sua conta</p>

      <!-- MSG GLOBAL -->
      <div id="msg"></div>

      <!-- ERRO LOGIN -->
      <div id="errorBox"></div>

      <!-- FORM -->
      <input id="email" type="email" placeholder="Email" autocomplete="username">

      <input id="senha" type="password" placeholder="Senha" autocomplete="current-password">

      <button onclick="login()">Entrar</button>

      <p>
        Não tem conta?
        <a href="register.html">Criar conta</a>
      </p>

    </div>

  </div>

  <!-- SCRIPT -->
  <script src="../js/auth.js"></script>

</body>
</html>
