<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="container">

  <div class="card">

    <h1>Fazer login</h1>
    <p>Use sua conta</p>

    <!-- MENSAGEM -->
    <div id="msg"></div>

    <!-- ERRO -->
    <div id="errorBox"></div>

    <input id="email" type="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <p>
      Não tem conta? <a href="register.html">Criar conta</a>
    </p>

  </div>

</div>

<script>
const API = "http://localhost:8000/auth";

// --------------------
// MSG
// --------------------
function showMsg(text, type = "success") {
  const el = document.getElementById("msg");

  el.innerHTML = text;
  el.style.marginBottom = "10px";
  el.style.padding = "10px";
  el.style.borderRadius = "10px";
  el.style.color = "#fff";
  el.style.background = type === "success" ? "#22c55e" : "#ef4444";
}

// --------------------
// BUSCAR USUÁRIO (/me)
// --------------------
async function fetchUser() {
  const token = localStorage.getItem("access_token");

  const res = await fetch(`${API}/me`, {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const user = await res.json();

  localStorage.setItem("user", JSON.stringify(user));
}

// --------------------
// LOGIN
// --------------------
async function login() {

  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value;

  const errorBox = document.getElementById("errorBox");
  errorBox.innerHTML = "";

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, senha })
  });

  const data = await res.json();

  if (data.success && data.data?.access_token) {

    localStorage.setItem("access_token", data.data.access_token);
    localStorage.setItem("refresh_token", data.data.refresh_token);

    // 🔥 pega usuário logado (inclui admin)
    await fetchUser();

    showMsg("Login realizado com sucesso");

    setTimeout(() => {
      window.location.replace("/pages/dashboard.html");
    }, 800);

  } else {

    errorBox.innerHTML = `
      <div class="error-box">
        <div class="error-msg">
          ${data.msg || data.detail || "Login inválido"}
        </div>
      </div>
    `;
  }
}
</script>

</body>
</html>
